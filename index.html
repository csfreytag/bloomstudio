<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom Studio</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
  --text: #1a1a18; --text2: #6b6b67; --text3: #9b9b96;
  --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
  --green: #1D9E75; --green-dark: #0F6E56; --green-light: #E1F5EE;
  --amber: #854F0B; --amber-light: #FAEEDA;
  --red: #A32D2D; --red-light: #FCEBEB;
  --radius: 8px; --radius-lg: 12px;
}
body { font-family: 'Georgia', serif; background: var(--bg3); color: var(--text); font-size: 14px; line-height: 1.5; height: 100vh; overflow: hidden; }
input, select, button, textarea { font-family: inherit; font-size: 13px; }
input[type=text], input[type=number] {
  background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius);
  padding: 5px 8px; color: var(--text); outline: none; transition: border-color 0.15s;
}
input[type=text]:focus, input[type=number]:focus { border-color: var(--green); }
select {
  background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius);
  padding: 5px 8px; color: var(--text); outline: none; cursor: pointer;
}
input[type=range] { accent-color: var(--green); cursor: pointer; }

.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar { width: 250px; min-width: 250px; background: var(--bg); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 16px; border-bottom: 0.5px solid var(--border); }
.sidebar-header h1 { font-size: 16px; font-weight: normal; color: var(--text); display: flex; align-items: center; gap: 8px; letter-spacing: 0.02em; }
.sidebar-header h1 i { color: var(--green); font-size: 18px; }
.sidebar-header p { font-size: 11px; color: var(--text3); margin-top: 3px; font-style: italic; }
.nav-tabs { display: flex; border-bottom: 0.5px solid var(--border); }
.nav-tab { flex: 1; padding: 10px 4px; font-size: 12px; text-align: center; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none; }
.nav-tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 500; }
.nav-tab:hover:not(.active) { color: var(--text); background: var(--bg2); }
.search-wrap { padding: 10px; border-bottom: 0.5px solid var(--border); }
.search-wrap input { width: 100%; }
.recipe-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.recipe-item { padding: 10px 16px; cursor: pointer; border-left: 3px solid transparent; transition: background 0.1s; }
.recipe-item:hover { background: var(--bg2); }
.recipe-item.active { background: var(--bg2); border-left-color: var(--green); }
.recipe-item .sku { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; font-family: monospace; }
.recipe-item .rname { font-size: 13px; color: var(--text); margin-top: 2px; }
.recipe-item .rprice { font-size: 12px; color: var(--text2); margin-top: 2px; }
.margin-pill { display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 10px; margin-left: 4px; }
.mg { background: #EAF3DE; color: #3B6D11; }
.mw { background: var(--amber-light); color: var(--amber); }
.mb { background: var(--red-light); color: var(--red); }
.new-btn { margin: 10px; font-size: 13px; padding: 8px; background: var(--green); color: white; border: none; border-radius: var(--radius); cursor: pointer; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.15s; }
.new-btn:hover { background: var(--green-dark); }
.pl-nav { padding: 12px; display: flex; flex-direction: column; gap: 4px; flex: 1; overflow-y: auto; }
.pl-nav p { font-size: 12px; color: var(--text2); line-height: 1.5; margin-bottom: 8px; font-style: italic; }
.pl-nav-btn { text-align: left; padding: 8px 10px; font-size: 13px; border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer; background: transparent; color: var(--text); transition: background 0.1s; display: flex; align-items: center; gap: 8px; }
.pl-nav-btn:hover, .pl-nav-btn.active { background: var(--bg2); }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.top-bar { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 11px 20px; display: flex; align-items: center; gap: 12px; }
.top-bar h2 { font-size: 15px; font-weight: normal; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.01em; }
.tab-bar { display: flex; gap: 2px; }
.tab { padding: 5px 12px; font-size: 13px; border-radius: var(--radius); cursor: pointer; color: var(--text2); border: 0.5px solid transparent; transition: all 0.1s; background: none; }
.tab:hover { background: var(--bg2); }
.tab.active { background: var(--bg2); color: var(--text); border-color: var(--border); }
.action-btns { display: flex; gap: 8px; }
.save-btn { background: var(--green); color: white; border: none; padding: 7px 16px; border-radius: var(--radius); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
.save-btn:hover { background: var(--green-dark); }
.delete-btn { background: none; border: 0.5px solid var(--border2); padding: 7px 12px; border-radius: var(--radius); font-size: 13px; cursor: pointer; color: var(--red); transition: background 0.1s; }
.delete-btn:hover { background: var(--red-light); }
.pl-save-btn { background: var(--green); color: white; border: none; padding: 6px 14px; border-radius: var(--radius); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; white-space: nowrap; }
.pl-save-btn:hover { background: var(--green-dark); }

/* Content */
.content { flex: 1; overflow-y: auto; padding: 16px 20px; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty-state i { font-size: 40px; display: block; margin-bottom: 12px; color: var(--text3); }
.empty-state h3 { font-size: 16px; font-weight: normal; color: var(--text); margin-bottom: 6px; }

/* Stats */
.stat-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; }
.stat-card .slabel { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
.stat-card .sval { font-size: 20px; color: var(--text); margin-top: 3px; }

/* Two col layout */
.two-col { display: grid; grid-template-columns: 1fr 220px; gap: 16px; align-items: start; }

/* Sections */
.section { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 12px; }
.section h3 { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11px; color: var(--text2); }
.field input, .field select { width: 100%; }

/* Photo */
.photo-box { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 12px; }
.photo-box h3 { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }
.photo-area { width: 100%; aspect-ratio: 1; border-radius: var(--radius); border: 1.5px dashed var(--border2); background: var(--bg2); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; transition: all 0.15s; }
.photo-area:hover { border-color: var(--green); background: var(--green-light); }
.photo-area img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
.photo-area .photo-label { font-size: 12px; color: var(--text2); text-align: center; z-index: 1; pointer-events: none; font-style: italic; }
.photo-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.photo-remove { display: block; margin: 6px auto 0; font-size: 12px; color: var(--red); background: none; border: none; cursor: pointer; }

/* Ingredient table */
.ing-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.ing-table th { text-align: left; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; padding: 0 8px 7px 0; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
.ing-table td { padding: 5px 8px 5px 0; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
.ing-table select { width: 100%; }
.ing-table input[type=number] { width: 62px; }
.del-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: 2px 4px; border-radius: 4px; font-size: 14px; line-height: 1; transition: color 0.1s; }
.del-btn:hover { color: var(--red); }
.add-row-btn { margin-top: 9px; font-size: 12px; color: var(--green); background: none; border: none; cursor: pointer; padding: 3px 0; display: flex; align-items: center; gap: 4px; }
.add-row-btn:hover { text-decoration: underline; }

/* Labor */
.labor-row { display: flex; align-items: center; gap: 10px; }
.labor-row input[type=range] { flex: 1; }
.labor-badge { font-size: 14px; color: var(--text); min-width: 40px; }
.labor-dollar { font-size: 13px; color: var(--text2); }

/* Cost breakdown */
.cb-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
.cb-row.total { font-weight: 600; border-bottom: none; padding-top: 10px; font-size: 14px; }
.cb-cat { color: var(--text3); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; padding: 9px 0 3px; }

/* Price list table */
.pl-wrap { overflow-x: auto; }
.pl-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 560px; }
.pl-table th { text-align: left; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; padding: 6px 8px 9px 0; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
.pl-table td { padding: 5px 8px 5px 0; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
.pl-table input[type=text] { width: 100%; }
.pl-table input[type=number] { width: 84px; }
.markup-val { font-size: 13px; font-weight: 500; white-space: nowrap; }
.markup-met { color: #0F6E56; }
.markup-off { color: var(--red); }
.diff-val { font-size: 11px; white-space: nowrap; }
.legend { display: flex; gap: 16px; font-size: 12px; color: var(--text2); margin-bottom: 12px; align-items: center; flex-wrap: wrap; font-style: italic; }
.legend-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.saved-flash { font-size: 12px; color: var(--green); margin-left: 6px; opacity: 0; transition: opacity 0.3s; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>

<div class="app">
 <div class="sidebar">
  <div class="sidebar-header">
   <h1><i class="ti ti-plant-2"></i> Bloom Studio</h1>
   <p>Flower recipe manager</p>
  </div>
  <div class="nav-tabs">
   <button class="nav-tab active" id="nt-recipes" onclick="setNav('recipes')">Recipes</button>
   <button class="nav-tab" id="nt-prices" onclick="setNav('prices')">Price lists</button>
  </div>
  <div id="sidebar-recipes" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
   <div class="search-wrap"><input type="text" placeholder="Search recipes…" id="searchInput" oninput="filterRecipes()" /></div>
   <div class="recipe-list" id="recipeList"></div>
   <button class="new-btn" onclick="newRecipe()"><i class="ti ti-plus"></i> New recipe</button>
  </div>
  <div id="sidebar-prices" style="display:none;">
   <div class="pl-nav">
    <p>Edit costs and set final retail prices.</p>
    <button class="pl-nav-btn active" id="plnav-flowers" onclick="showPL('flowers')"><i class="ti ti-flower"></i> Flowers</button>
    <button class="pl-nav-btn" id="plnav-fillers" onclick="showPL('fillers')"><i class="ti ti-leaf"></i> Greenery &amp; filler</button>
    <button class="pl-nav-btn" id="plnav-containers" onclick="showPL('containers')"><i class="ti ti-bottle"></i> Containers</button>
    <button class="pl-nav-btn" id="plnav-accents" onclick="showPL('accents')"><i class="ti ti-sparkles"></i> Accents</button>
    <button class="pl-nav-btn" id="plnav-hardgoods" onclick="showPL('hardgoods')"><i class="ti ti-tools"></i> Hardgoods</button>
   </div>
  </div>
 </div>

 <div class="main">
  <div class="top-bar">
   <h2 id="topTitle">Select a recipe</h2>
   <div class="tab-bar" id="tabBar" style="display:none;">
    <button class="tab active" onclick="switchTab('recipe')">Recipe</button>
    <button class="tab" onclick="switchTab('costs')">Cost breakdown</button>
   </div>
   <div class="action-btns" id="actionBtns" style="display:none;">
    <button class="delete-btn" onclick="deleteRecipe()"><i class="ti ti-trash"></i> Delete</button>
    <button class="save-btn" onclick="saveRecipe()"><i class="ti ti-check"></i> Save</button>
   </div>
  </div>
  <div class="content" id="mainContent">
   <div class="empty-state">
    <i class="ti ti-plant"></i>
    <h3>No recipe selected</h3>
    <p>Choose a recipe from the list or create a new one.</p>
   </div>
  </div>
 </div>
</div>

// ── Cost calc ─────────────────────────────────────────────────
function calcCost(r){
  const vp=gpCost(CONTAINERS,r.container||'None'),ap=gpCost(ACCENTS,r.accent||'None');
  const fc=(r.flowers||[]).reduce((s,f)=>s+f.qty*gpCost(FLOWERS,f.name),0);
  const fil=(r.fillers||[]).reduce((s,f)=>s+f.qty*gpCost(FILLERS,f.name),0);
  const labor=r.price*(r.laborPct||0)/100;
  const total=vp+ap+fc+fil+labor;
  const margin=r.price>0?(r.price-total)/r.price*100:0;
  return{vp,ap,fc,fil,labor,total,margin,pct:r.laborPct||0};
}
function mc(m){return m>=40?'mg':m>=20?'mw':'mb';}

  document.getElementById('sidebar-recipes').style.display=nav==='recipes'?'flex':'none';
  document.getElementById('sidebar-prices').style.display=nav==='prices'?'flex':'none';

// ── Price lists ───────────────────────────────────────────────
function showPL(type){
  activePL=type;
  ['flowers','fillers','containers','accents','hardgoods'].forEach(t=>{
    const b=document.getElementById('plnav-'+t);
    if(b){b.classList.toggle('active',t===type);}
  });
  const labels={flowers:'Flower costs',fillers:'Greenery & filler costs',containers:'Container costs',accents:'Accent costs',hardgoods:'Hardgoods costs'};
  document.getElementById('topTitle').textContent=labels[type];
  document.getElementById('tabBar').style.display='none';
  document.getElementById('actionBtns').style.display='none';
  renderPriceList(type);
}

function renderPriceList(type){
  const list=getList(type),mult=getMult(type);
  const multLabel=mult===4?'× 4':'× 3.5';
  const rows=list.filter(x=>x.n!=='None').map((item,i)=>{
    const idx=i+1;
    const markup=parseFloat((item.p*mult).toFixed(2));
    const finalVal=(item.r!==null&&item.r!==undefined)?item.r:markup;
    const diff=parseFloat((finalVal-markup).toFixed(2));
    const met=finalVal>=markup;
    const diffStr=diff===0?'':(diff>0?'+$'+diff.toFixed(2):'-$'+Math.abs(diff).toFixed(2));
    return`<tr data-idx="${idx}">
      <td style="width:36%"><input type="text" value="${item.n}" onchange="updatePLName('${type}',${idx},this.value)"/></td>
      <td style="width:13%"><input type="number" value="${item.p}" min="0" step="0.01" onchange="updatePLCost('${type}',${idx},this.value,this)"/></td>
      <td style="width:16%"><span class="markup-val ${met?'markup-met':'markup-off'}" id="mkup-${type}-${idx}">$${markup.toFixed(2)}</span></td>
      <td style="width:17%"><input type="number" value="${finalVal.toFixed(2)}" min="0" step="0.01" onchange="updatePLRetail('${type}',${idx},this.value,this)"/></td>
      <td style="width:10%"><span class="diff-val" id="diff-${type}-${idx}" style="color:${met?'#0F6E56':'#A32D2D'}">${diffStr}</span></td>
      <td style="width:4%"><button class="del-btn" onclick="deletePLItem('${type}',${idx})"><i class="ti ti-x"></i></button></td>
    </tr>`;
  }).join('');

  document.getElementById('mainContent').innerHTML=`
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;">
   <div class="legend" style="flex:1;">
    <span><span class="legend-dot" style="background:#0F6E56;"></span>Green = meets markup goal (cost ${multLabel})</span>
    <span><span class="legend-dot" style="background:#A32D2D;"></span>Red = below markup goal</span>
   </div>
   <button class="pl-save-btn" onclick="savePriceLists()"><i class="ti ti-device-floppy"></i> Save prices</button>
   <span class="saved-flash" id="savedFlash">Saved!</span>
  </div>
  <div class="section">
   <div class="pl-wrap">
    <table class="pl-table">
     <thead><tr>
      <th>Name</th><th>Cost ($)</th><th>Markup (${multLabel})</th><th>Final retail ($)</th><th>Diff</th><th></th>
     </tr></thead>
     <tbody id="plRows">${rows}</tbody>
    </table>
   </div>
   <button class="add-row-btn" onclick="addPLItem('${type}')"><i class="ti ti-plus"></i> Add item</button>
  </div>`;
}

function updatePLName(type,idx,val){getList(type)[idx].n=val;}
function updatePLCost(type,idx,val,el){
  const item=getList(type)[idx];
  item.p=parseFloat(val)||0;
  const mult=getMult(type),markup=parseFloat((item.p*mult).toFixed(2));
  const row=el.closest('tr');
  if(item.r===null||item.r===undefined) row.cells[3].querySelector('input').value=markup.toFixed(2);
  refreshPLRow(row,item,mult);
}
function updatePLRetail(type,idx,val,el){
  const item=getList(type)[idx];
  item.r=parseFloat(val)||0;
  refreshPLRow(el.closest('tr'),item,getMult(type));
}
function refreshPLRow(row,item,mult){
  const markup=parseFloat((item.p*mult).toFixed(2));
  const finalVal=(item.r!==null&&item.r!==undefined)?item.r:markup;
  const diff=parseFloat((finalVal-markup).toFixed(2));
  const met=finalVal>=markup;
  const mkupCell=row.cells[2].querySelector('span')||row.cells[2];
  mkupCell.textContent='$'+markup.toFixed(2);
  mkupCell.className='markup-val '+(met?'markup-met':'markup-off');
  const diffCell=row.cells[4].querySelector('span')||row.cells[4];
  diffCell.style.color=met?'#0F6E56':'#A32D2D';
  diffCell.textContent=diff===0?'':(diff>0?'+$'+diff.toFixed(2):'-$'+Math.abs(diff).toFixed(2));
}
function deletePLItem(type,idx){getList(type).splice(idx,1);renderPriceList(type);}
function addPLItem(type){
  getList(type).push({n:'New item',p:0,r:null});
  renderPriceList(type);
  const rows=document.getElementById('plRows').querySelectorAll('tr');
  if(rows.length) rows[rows.length-1].querySelector('input[type=text]').focus();
}

function renderContent(){
  const r=recipes.find(x=>x.id===activeId);if(!r)return;
  if(activeTab==='recipe')renderRecipeTab(r);else renderCostsTab(r);
}
function mkOpts(list,sel){return list.map(f=>`<option value="${f.n}"${f.n.trim()===sel.trim()?' selected':''}>${f.n}${f.p>0?' ($'+f.p+')':''}</option>`).join('');}

function renderRecipeTab(r){
  const c=calcCost(r);
  const flowers=r.flowers.length?r.flowers:[{name:'None',qty:1}];
  const photoHtml=r.photo
    ?`<div class="photo-area"><img src="${r.photo}" alt="Arrangement photo"/><input type="file" accept="image/*" onchange="handlePhoto(event)" title="Change photo"/></div><button class="photo-remove" onclick="removePhoto()"><i class="ti ti-x"></i> Remove</button>`
    :`<div class="photo-area"><i class="ti ti-camera" style="font-size:28px;color:var(--text3);margin-bottom:6px;"></i><div class="photo-label">Click to upload<br>arrangement photo</div><input type="file" accept="image/*" onchange="handlePhoto(event)"/></div>`;

  document.getElementById('mainContent').innerHTML=`
  <div class="stat-row">
   <div class="stat-card"><div class="slabel">Retail price</div><div class="sval">$${r.price.toFixed(2)}</div></div>
   <div class="stat-card"><div class="slabel">Total cost</div><div class="sval">$${c.total.toFixed(2)}</div></div>
   <div class="stat-card"><div class="slabel">Gross margin</div><div class="sval" style="color:${c.margin>=40?'#0F6E56':c.margin>=20?'#854F0B':'#A32D2D'}">${c.margin.toFixed(1)}%</div></div>
   <div class="stat-card"><div class="slabel">Projection</div><div class="sval">${r.projection}</div></div>
  </div>
  <div class="two-col">
   <div>
    <div class="section">
     <h3>Details</h3>
     <div class="field-row">
      <div class="field"><label>SKU</label><input id="f_sku" type="text" value="${r.sku}" placeholder="e.g. FMD2601"/></div>
      <div class="field"><label>Name</label><input id="f_name" type="text" value="${r.name}" placeholder="Arrangement name"/></div>
     </div>
     <div class="field-row">
      <div class="field"><label>Retail price ($)</label><input id="f_price" type="number" value="${r.price}" min="0" step="0.01" oninput="refreshLaborDollar()"/></div>
      <div class="field"><label>Projection (units)</label><input id="f_proj" type="number" value="${r.projection}" min="0"/></div>
     </div>
    </div>
    <div class="section">
     <h3>Container</h3>
     <div class="field-row">
      <div class="field"><label>Container</label><select id="f_container">${mkOpts(CONTAINERS,r.container||'None')}</select></div>
      <div class="field"><label>Accent</label><select id="f_accent">${mkOpts(ACCENTS,r.accent||'None')}</select></div>
     </div>
    </div>
    <div class="section">
     <h3>Flowers</h3>
     <table class="ing-table">
      <thead><tr><th style="width:55%">Flower</th><th>Stems</th><th>Cost</th><th></th></tr></thead>
      <tbody id="flowerRows">${flowers.map(f=>ingRow(f,'flower')).join('')}</tbody>
     </table>
     <button class="add-row-btn" onclick="addRow('flower')"><i class="ti ti-plus"></i> Add flower</button>
    </div>
    <div class="section">
     <h3>Greenery &amp; filler</h3>
     <table class="ing-table">
      <thead><tr><th style="width:55%">Filler</th><th>Qty</th><th>Cost</th><th></th></tr></thead>
      <tbody id="fillerRows">${r.fillers.map(f=>ingRow(f,'filler')).join('')}</tbody>
     </table>
     <button class="add-row-btn" onclick="addRow('filler')"><i class="ti ti-plus"></i> Add filler</button>
    </div>
    <div class="section">
     <h3>Labor</h3>
     <p style="font-size:12px;color:var(--text2);margin-bottom:9px;font-style:italic;">% of retail price ($${r.price.toFixed(2)})</p>
     <div class="labor-row">
      <input type="range" id="f_laborpct" min="0" max="40" step="1" value="${r.laborPct||0}" oninput="refreshLaborDollar()"/>
      <span class="labor-badge" id="labor_pct_label">${r.laborPct||0}%</span>
      <span class="labor-dollar" id="labor_dollar">= $${c.labor.toFixed(2)}</span>
     </div>
    </div>
   </div>
   <div>
    <div class="photo-box"><h3>Photo</h3>${photoHtml}</div>
   </div>
  </div>`;
}

function refreshLaborDollar(){
  const pct=parseFloat(document.getElementById('f_laborpct').value)||0;
  const price=parseFloat(document.getElementById('f_price').value)||0;
  document.getElementById('labor_pct_label').textContent=pct+'%';
  document.getElementById('labor_dollar').textContent='= $'+(price*pct/100).toFixed(2);
}
function ingRow(f,type){
  const list=type==='flower'?FLOWERS:FILLERS,cost=f.qty*gpCost(list,f.name);
  return`<tr class="${type}-row"><td><select class="f-sel" onchange="updateRowCost(this)">${mkOpts(list,f.name)}</select></td><td><input class="f-qty" type="number" value="${f.qty}" min="0" step="1" oninput="updateRowCost(this)"/></td><td class="f-cost" style="color:var(--text2)">$${cost.toFixed(2)}</td><td><button class="del-btn" onclick="this.closest('tr').remove()"><i class="ti ti-x"></i></button></td></tr>`;
}
function updateRowCost(el){
  const row=el.closest('tr'),type=row.classList.contains('flower-row')?'flower':'filler';
  const list=type==='flower'?FLOWERS:FILLERS,name=row.querySelector('.f-sel').value,qty=parseFloat(row.querySelector('.f-qty').value)||0;
  row.querySelector('.f-cost').textContent='$'+(qty*gpCost(list,name)).toFixed(2);
}
function addRow(type){
  const tbody=document.getElementById(type==='flower'?'flowerRows':'fillerRows'),tr=document.createElement('tr');
  tr.className=type+'-row';
  const list=type==='flower'?FLOWERS:FILLERS;
  tr.innerHTML=`<td><select class="f-sel" onchange="updateRowCost(this)">${mkOpts(list,'None')}</select></td><td><input class="f-qty" type="number" value="1" min="0" step="1" oninput="updateRowCost(this)"/></td><td class="f-cost" style="color:var(--text2)">$0.00</td><td><button class="del-btn" onclick="this.closest('tr').remove()"><i class="ti ti-x"></i></button></td>`;
  tbody.appendChild(tr);
}
function handlePhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{const r=recipes.find(x=>x.id===activeId);if(!r)return;r.photo=ev.target.result;saveAll();renderContent();};
  reader.readAsDataURL(file);
}
function removePhoto(){const r=recipes.find(x=>x.id===activeId);if(!r)return;r.photo=null;saveAll();renderContent();}

// ── Cost breakdown tab ────────────────────────────────────────
function renderCostsTab(r){
  const c=calcCost(r);
  const sd=(r.flowers||[]).map(f=>{const p=gpCost(FLOWERS,f.name);return`<div class="cb-row"><span>${f.qty}× ${f.name}</span><span>$${(f.qty*p).toFixed(2)}</span></div>`;}).join('');
  const fd=(r.fillers||[]).map(f=>{const p=gpCost(FILLERS,f.name);return`<div class="cb-row"><span>${f.qty}× ${f.name}</span><span>$${(f.qty*p).toFixed(2)}</span></div>`;}).join('');
  const projProfit=(r.price-c.total)*r.projection;
  document.getElementById('mainContent').innerHTML=`
  <div class="stat-row">
   <div class="stat-card"><div class="slabel">Retail price</div><div class="sval">$${r.price.toFixed(2)}</div></div>
   <div class="stat-card"><div class="slabel">Total cost</div><div class="sval">$${c.total.toFixed(2)}</div></div>
   <div class="stat-card"><div class="slabel">Gross margin</div><div class="sval" style="color:${c.margin>=40?'#0F6E56':c.margin>=20?'#854F0B':'#A32D2D'}">${c.margin.toFixed(1)}%</div></div>
   <div class="stat-card"><div class="slabel">Profit / unit</div><div class="sval">$${(r.price-c.total).toFixed(2)}</div></div>
  </div>
  <div class="two-col">
   <div>
    <div class="section">
     <h3>Cost breakdown</h3>
     <div class="cb-cat">Container</div>
     <div class="cb-row"><span>${r.container||'No container'}</span><span>$${c.vp.toFixed(2)}</span></div>
     ${c.ap>0?`<div class="cb-row"><span>${r.accent}</span><span>$${c.ap.toFixed(2)}</span></div>`:''}
     <div class="cb-cat">Flowers</div>
     ${sd||'<div class="cb-row" style="color:var(--text2)"><span>None</span><span>$0.00</span></div>'}
     ${fd?`<div class="cb-cat">Greenery &amp; filler</div>${fd}`:''}
     <div class="cb-cat">Labor</div>
     <div class="cb-row"><span>Labor (${c.pct}% of $${r.price.toFixed(2)} retail)</span><span>$${c.labor.toFixed(2)}</span></div>
     <div class="cb-row total"><span>Total cost</span><span>$${c.total.toFixed(2)}</span></div>
    </div>
    <div class="section">
     <h3>Projection analysis</h3>
     <div class="cb-row"><span>Units projected</span><span>${r.projection}</span></div>
     <div class="cb-row"><span>Projected revenue</span><span>$${(r.price*r.projection).toLocaleString()}</span></div>
     <div class="cb-row"><span>Projected cost</span><span>$${(c.total*r.projection).toLocaleString()}</span></div>
     <div class="cb-row total"><span>Projected gross profit</span><span style="color:${projProfit>=0?'#0F6E56':'#A32D2D'}">$${projProfit.toLocaleString()}</span></div>
    </div>
   </div>
   <div>${r.photo?`<div class="photo-box"><h3>Photo</h3><img src="${r.photo}" alt="photo" style="width:100%;border-radius:var(--radius);object-fit:cover;"/></div>`:''}</div>
  </div>`;
}

// ── Init ──────────────────────────────────────────────────────
renderList();
</script>
</body>
</html>

# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting (manual)
on:
  # Manual only. Production is the SHARED freytags-purchasing project (also runs
  # the live Purchasing app), so hosting is published deliberately, never on
  # every push. Deploy locally with the explicit target:
  #   firebase deploy --only hosting:freytags-recipes
  # or click "Run workflow" here to publish the current main.
  workflow_dispatch:
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FREYTAGS_PURCHASING }}
          channelId: live
          projectId: freytags-purchasing
          # Deploy ONLY the Recipe Guide site — never the Purchasing hosting
          # site on this shared project.
          target: freytags-recipes
